<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #3d3d3a; }
      .th  { font-size: 14px; font-weight: 500; fill: #26215C; }
      .ts  { font-size: 12px; fill: #5F5E5A; }
      .arr { fill: none; stroke: #888780; stroke-width: 1.5; }

      /* c-purple */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #3C3489; }
      .c-purple .ts   { fill: #534AB7; }

      /* c-teal */
      .c-teal rect    { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th     { fill: #085041; }
      .c-teal .ts     { fill: #0F6E56; }

      /* c-amber */
      .c-amber rect   { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th    { fill: #633806; }
      .c-amber .ts    { fill: #854F0B; }

      /* c-gray */
      .c-gray rect    { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th     { fill: #444441; }
      .c-gray .ts     { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- Step 1: User input -->
  <g class="c-purple">
    <rect x="200" y="30" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">User submits form</text>
    <text class="ts" x="340" y="72" text-anchor="middle" dominant-baseline="central">Product · Problem · Users · Features</text>
  </g>

  <line x1="340" y1="86" x2="340" y2="126" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="109" dominant-baseline="central">POST /api/generate-brd/</text>

  <!-- Step 2: Django API -->
  <g class="c-teal">
    <rect x="200" y="126" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="148" text-anchor="middle" dominant-baseline="central">Django REST API</text>
    <text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central">nova_generate_brd view · validates fields</text>
  </g>

  <line x1="340" y1="182" x2="340" y2="222" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="205" dominant-baseline="central">boto3 invoke_model</text>

  <!-- Step 3: Bedrock Runtime -->
  <g class="c-amber">
    <rect x="200" y="222" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="244" text-anchor="middle" dominant-baseline="central">Amazon Bedrock Runtime</text>
    <text class="ts" x="340" y="264" text-anchor="middle" dominant-baseline="central">us-east-1 · credentials resolved</text>
  </g>

  <line x1="340" y1="278" x2="340" y2="318" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="301" dominant-baseline="central">structured prompt</text>

  <!-- Step 4: Nova model -->
  <g class="c-amber">
    <rect x="200" y="318" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="340" text-anchor="middle" dominant-baseline="central">Amazon Nova 2 Lite</text>
    <text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">global.amazon.nova-2-lite-v1:0</text>
  </g>

  <!-- Fan lines -->
  <line x1="340" y1="414" x2="139" y2="444" fill="none" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="414" x2="291" y2="444" fill="none" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="414" x2="443" y2="444" fill="none" stroke="#7F77DD" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="414" x2="139" y2="508" fill="none" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="414" x2="291" y2="508" fill="none" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="414" x2="443" y2="508" fill="none" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- BRD container -->
  <rect x="54" y="414" width="572" height="200" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts" x="76" y="432" dominant-baseline="central">Generated BRD</text>

  <g class="c-purple">
    <rect x="72"  y="444" width="134" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="139" y="460" text-anchor="middle" dominant-baseline="central">Introduction</text>
    <text class="ts" x="139" y="477" text-anchor="middle" dominant-baseline="central">Purpose &amp; scope</text>
  </g>
  <g class="c-purple">
    <rect x="224" y="444" width="134" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="291" y="460" text-anchor="middle" dominant-baseline="central">Scope</text>
    <text class="ts" x="291" y="477" text-anchor="middle" dominant-baseline="central">In / out of scope</text>
  </g>
  <g class="c-purple">
    <rect x="376" y="444" width="134" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="443" y="460" text-anchor="middle" dominant-baseline="central">Stakeholders</text>
    <text class="ts" x="443" y="477" text-anchor="middle" dominant-baseline="central">Roles &amp; interests</text>
  </g>
  <g class="c-teal">
    <rect x="72"  y="508" width="134" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="139" y="524" text-anchor="middle" dominant-baseline="central">Functional Reqs</text>
    <text class="ts" x="139" y="541" text-anchor="middle" dominant-baseline="central">FR-001, FR-002 …</text>
  </g>
  <g class="c-teal">
    <rect x="224" y="508" width="134" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="291" y="522" text-anchor="middle" dominant-baseline="central">Non-Functional</text>
    <text class="ts" x="291" y="539" text-anchor="middle" dominant-baseline="central">NFR-001, NFR-002 …</text>
  </g>
  <g class="c-teal">
    <rect x="376" y="508" width="134" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="443" y="524" text-anchor="middle" dominant-baseline="central">Success Metrics</text>
    <text class="ts" x="443" y="541" text-anchor="middle" dominant-baseline="central">KPIs &amp; acceptance</text>
  </g>

  <!-- Legend -->
  <rect x="54"  y="554" width="10" height="10" rx="2" fill="#534AB7"/>
  <text class="ts" x="70"  y="562" dominant-baseline="central">Structural / UI</text>
  <rect x="170" y="554" width="10" height="10" rx="2" fill="#0F6E56"/>
  <text class="ts" x="186" y="562" dominant-baseline="central">Requirements</text>
  <rect x="286" y="554" width="10" height="10" rx="2" fill="#854F0B"/>
  <text class="ts" x="302" y="562" dominant-baseline="central">AWS / Bedrock</text>
  <rect x="396" y="554" width="10" height="10" rx="2" fill="#5F5E5A"/>
  <text class="ts" x="412" y="562" dominant-baseline="central">Storage</text>

  <line x1="340" y1="614" x2="340" y2="654" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="637" dominant-baseline="central">{ "brd": "..." }</text>

  <!-- Step 6: Return to frontend -->
  <g class="c-purple">
    <rect x="200" y="654" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="676" text-anchor="middle" dominant-baseline="central">BRD returned to frontend</text>
    <text class="ts" x="340" y="696" text-anchor="middle" dominant-baseline="central">Displayed in Streamlit · exportable</text>
  </g>

  <line x1="340" y1="710" x2="340" y2="750" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 7: SQLite -->
  <g class="c-gray">
    <rect x="200" y="750" width="280" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="773" text-anchor="middle" dominant-baseline="central">Saved to SQLite</text>
  </g>
</svg>
